name: Data Processing Pipeline

# FOR TESTING PURPOSES ONLY

on:
  schedule:
    - cron: '0 2 * * *'   # daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      delay:
        description: 'Request delay in seconds'
        required: false
        default: '2.4'
      status_only:
        description: 'Print stats only (true/false)'
        required: false
        default: 'false'

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # GitHub Actions hard limit for public repos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── pull DB from private data repo ──────────────────────────────
      - name: Fetch dataset
        env:
          DATA_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
          DATA_REPO:  ${{ secrets.DATA_REPO_SLUG }}
        run: |
          git lfs install
          git clone "https://x-access-token:${DATA_TOKEN}@github.com/${DATA_REPO}.git" _datastore
          if [ -f "_datastore/results_all.db" ]; then
            # Copy DB; also copy WAL side-files if they exist (DELETE journal has none,
            # but guard in case a legacy WAL-mode DB is present)
            cp _datastore/results_all.db results_all.db
            [ -f "_datastore/results_all.db-wal" ] && cp _datastore/results_all.db-wal results_all.db-wal || true
            [ -f "_datastore/results_all.db-shm" ] && cp _datastore/results_all.db-shm results_all.db-shm || true
            # Force WAL checkpoint so the main file is fully self-contained before Python opens it
            sqlite3 results_all.db "PRAGMA wal_checkpoint(TRUNCATE); PRAGMA journal_mode=DELETE;"
            echo "DB restored ($(du -sh results_all.db | cut -f1))"
          else
            echo "No existing DB found – starting fresh"
            touch results_all.db
          fi

      # ── system deps ─────────────────────────────────────────────────
      - name: Install system deps
        run: sudo apt-get install -y sqlite3

      # ── Python env ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── run ─────────────────────────────────────────────────────────
      # Step timeout = 330 min. Python self-stops at 300 min (--max-minutes).
      # This leaves 30 min for Sync dataset to upload the DB, well before
      # the 360-min job hard limit.
      - name: Run processor
        timeout-minutes: 330
        env:
          PROBE_ENDPOINT: ${{ secrets.PROBE_ENDPOINT }}
        run: |
          DELAY="${{ github.event.inputs.delay || '1.5' }}"
          STATUS="${{ github.event.inputs.status_only || 'false' }}"
          ARGS="--db results_all.db --delay $DELAY --max-minutes 300"
          if [ "$STATUS" = "true" ]; then ARGS="$ARGS --status"; fi
          exec python src/batch_http_probe_scheduler.py $ARGS

      # ── push DB back to private data repo ───────────────────────────
      - name: Sync dataset
        if: always()
        env:
          DATA_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
          DATA_REPO:  ${{ secrets.DATA_REPO_SLUG }}
        run: |
          # Ensure DELETE journal: WAL is fully merged into main file before copy
          sqlite3 results_all.db "PRAGMA wal_checkpoint(TRUNCATE); PRAGMA journal_mode=DELETE;" 2>/dev/null || true
          cp results_all.db _datastore/results_all.db
          cd _datastore
          git lfs install
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add results_all.db
          git diff --cached --quiet \
            && echo "No changes to DB" \
            || git commit -m "chore: update dataset $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push "https://x-access-token:${DATA_TOKEN}@github.com/${DATA_REPO}.git" HEAD

      # ── upload log as artifact ───────────────────────────────────────
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: probe-log-${{ github.run_number }}
          path: probe_scheduler.log
          retention-days: 7
